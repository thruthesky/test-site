services:
  sitephp:
    build:
      context: .
      dockerfile: deploy/dokploy/Dockerfile
    environment:
      APP_NAME: ${APP_NAME:-Test Site}
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost:8080}
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-test_site}
      DB_USERNAME: ${DB_USERNAME:-test_site}
      DB_PASSWORD: ${DB_PASSWORD:-test_site}
      SESSION_SAVE_PATH: /var/www/html/storage/sessions
      UPLOAD_PUBLIC_PATH: /var/www/html/public/uploads/profiles
      UPLOAD_PUBLIC_URL_BASE: /uploads/profiles
    volumes:
      - .:/var/www/html
      - app_storage:/var/www/html/storage
      - app_uploads:/var/www/html/public/uploads
    depends_on:
      - db

  web:
    image: nginx:1.27-alpine
    depends_on:
      - sitephp
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      - .:/var/www/html:ro
      - app_uploads:/var/www/html/public/uploads
      - ./deploy/dokploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-test_site}
      POSTGRES_USER: ${DB_USERNAME:-test_site}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-test_site}
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
  app_storage:
  app_uploads:
